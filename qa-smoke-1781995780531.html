<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Smoke 1781995780531</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f7fa; }
    .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; color: #1a1a2e; }
    .counter { font-size: 3rem; font-weight: 700; color: #0f3460; margin: 1rem 0; }
    button { background: #0f3460; color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #1a5276; }
  </style>
</head>
<body>
  <div class="card">
    <h1>QA Smoke 1781995780531</h1>
    <div class="counter" id="counter">0</div>
    <button id="incrementBtn">Click to Increment</button>
  </div>
  <script>
    let count = 0;
    const counterEl = document.getElementById('counter');
    const btn = document.getElementById('incrementBtn');
    btn.addEventListener('click', function() {
      count += 1;
      counterEl.textContent = count;
    });
  </script>
</body>
</html>
