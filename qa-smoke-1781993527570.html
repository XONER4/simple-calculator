<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Smoke 1781993527570</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f7fa; }
    .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #1a1a2e; }
    .counter { font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem; color: #0f3460; }
    button { font-size: 1.1rem; padding: 0.6rem 1.8rem; border: none; border-radius: 8px; background: #16213e; color: white; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #0f3460; }
  </style>
</head>
<body>
  <div class="card">
    <h1>QA Smoke 1781993527570</h1>
    <div class="counter" id="counter">0</div>
    <button id="incrementBtn">Click to increment</button>
  </div>
  <script>
    let count = 0;
    const counterEl = document.getElementById('counter');
    const btn = document.getElementById('incrementBtn');
    btn.addEventListener('click', function() {
      count += 1;
      counterEl.textContent = count;
    });
  </script>
</body>
</html>
